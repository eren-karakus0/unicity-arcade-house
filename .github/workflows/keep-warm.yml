name: keep-warm

# Ping the free Render backend so it doesn't spin down (it sleeps after ~15 min
# idle). Scheduled every 5 min because GitHub Actions cron is often delayed
# 10-15 min under load — the extra attempts keep us inside the idle window.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: |
          curl -sS -m 60 https://sphere-agent-bazaar-backend.onrender.com/api/health || true
